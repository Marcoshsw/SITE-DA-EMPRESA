services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      GIN_MODE: release
      FRONTEND_DIR: /app/frontend
      CORS_ORIGINS: "https://${SITE_DOMAIN}"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
